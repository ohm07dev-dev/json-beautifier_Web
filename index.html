<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Beautifier</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BBZ4GMVXR2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());

    gtag("config", "G-BBZ4GMVXR2");
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class"
    };
  </script>
  <link rel="stylesheet" href="style.css?v=20260525-5">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 transition-colors duration-200 dark:bg-slate-950 dark:text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-5 px-4 py-5 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight sm:text-3xl">JSON Formatter & Beautifier</h1>
        <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">Format, minify, copy, and validate JSON in your browser.</p>
      </div>

      <button
        id="themeToggle"
        type="button"
        class="inline-flex h-10 items-center justify-center rounded-md border border-slate-300 bg-white px-4 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:focus:ring-offset-slate-950"
        aria-pressed="false"
      >
        Dark Mode
      </button>
    </header>

    <section class="grid flex-1 gap-4 lg:grid-cols-[1fr_auto_1fr]">
      <div class="editor-panel">
        <div class="editor-header">
          <label for="jsonInput" class="text-sm font-semibold">Input JSON</label>
          <div class="flex items-center gap-2">
            <span class="text-xs text-slate-500 dark:text-slate-400">Raw JSON</span>
            <button id="copyInputBtn" type="button" class="icon-btn" title="Copy input" aria-label="Copy input">
              <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></rect>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="code-editor relative min-h-0 flex-1 overflow-hidden" style="position: relative; min-height: 0; flex: 1; overflow: hidden;">
          <pre
            id="inputHighlight"
            class="highlight-layer absolute inset-0 m-0 overflow-auto"
            style="position: absolute; inset: 0; margin: 0; overflow: auto;"
            aria-hidden="true"
          ></pre>
          <textarea
            id="jsonInput"
            class="code-area input-code-area absolute inset-0 h-full w-full"
            style="position: absolute; inset: 0; width: 100%; height: 100%;"
            spellcheck="false"
            wrap="off"
            placeholder='{"name":"JSON Beauty","features":["format","minify","copy"]}'
          ></textarea>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-center gap-2 lg:w-32 lg:flex-col">
        <button id="formatBtn" type="button" class="action-btn primary-btn">Beautify</button>
        <button id="minifyBtn" type="button" class="action-btn">Minify</button>
        <button id="escapeBtn" type="button" class="action-btn">Encode JSON String</button>
        <button id="clearBtn" type="button" class="action-btn danger-btn">Clear</button>
      </div>

      <div class="editor-panel">
        <div class="editor-header">
          <label for="jsonOutput" class="text-sm font-semibold">Output</label>
          <div class="flex items-center gap-2">
            <span id="statusText" class="text-xs text-slate-500 dark:text-slate-400">Ready</span>
            <button id="copyBtn" type="button" class="icon-btn" title="Copy output" aria-label="Copy output">
              <svg viewBox="0 0 24 24" aria-hidden="true" class="h-4 w-4">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></rect>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
        </div>
        <textarea
          id="jsonOutput"
          class="code-area"
          spellcheck="false"
          wrap="off"
          readonly
          placeholder="Formatted JSON will appear here."
        ></textarea>
      </div>
    </section>

    <p id="errorMessage" class="min-h-6 text-sm font-medium text-red-600 dark:text-red-400" role="alert" aria-live="polite"></p>
  </main>

  <script src="app.js?v=20260525-5"></script>
</body>
</html>
